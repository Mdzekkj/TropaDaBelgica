<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TROPA DA BÉLGICA - Advanced Elite Kit</title>
<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Pirata+One&family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* -----------------------------------------------------------
   ESTILO BÉLGICA - GRADIENTE DE FUNDO E GLOW FX
   ----------------------------------------------------------- */

*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}

body{
    margin:0; font-family: 'Fredoka', sans-serif; color: #f2f2f2; background-color: #000; 
    /* GRADIENTES NOS CANTOS RECUPERADOS */
    background-image: 
        radial-gradient(circle at 0% 0%, rgba(204, 0, 0, 0.25) 0%, transparent 45%),
        radial-gradient(circle at 100% 0%, rgba(255, 204, 0, 0.15) 0%, transparent 45%),
        radial-gradient(circle at 0% 100%, rgba(255, 204, 0, 0.15) 0%, transparent 45%),
        radial-gradient(circle at 100% 100%, rgba(204, 0, 0, 0.25) 0%, transparent 45%),
        /* TEXTURA DE PONTINHOS */
        url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAYAAACp8Z5+AAAAIklEQVQIW2NkQAKrVq36z8gAFWNZvXr1f0ZGRpYVq1b9Z2QAALiVCk5fXj43AAAAAElFTkSuQmCC');
    background-size: auto, auto, auto, auto, 4px 4px;
    background-attachment: fixed; 
    min-height: 100vh;
}

.container{max-width:850px; margin:auto; padding:20px; position: relative;}

/* TÍTULO - GLOW SUTIL */
.tropa-titulo { 
    text-align:center; color: #fff; font-family: 'Pirata One', cursive; font-size: 5rem; letter-spacing: 8px; margin-bottom: 25px; text-transform: uppercase;
    text-shadow: 2px 2px 4px #000, 0 0 8px rgba(255, 204, 0, 0.6), 0 0 15px rgba(204, 0, 0, 0.5);
}

/* CARDS COM GLOW VERMELHO ATRÁS */
.card{ 
    background: rgba(13, 13, 13, 0.9); border: 1px solid rgba(255, 255, 255, 0.05); padding: 25px; border-radius: 20px; margin-bottom: 20px; 
    box-shadow: 0 0 20px rgba(204, 0, 0, 0.4); 
    backdrop-filter: blur(5px);
}

h3{ color: #cc0000; font-weight: bold; margin-top: 0; display: flex; align-items: center; gap: 12px; font-size: 1.3rem; text-transform: uppercase; }

.input-row { display: grid; grid-template-columns: 2fr 1fr; gap: 15px; margin-bottom: 15px; }

.select-box, .input-text { 
    width: 100%; height: 55px; background: #000; border: 1px solid #333; padding: 0 18px; border-radius: 12px; color: #fff; outline: none; font-size: 17px; 
}

.input-row label { display: block; color: #666; font-weight: 600; font-size: 12px; margin-bottom: 6px; text-transform: uppercase; }

/* BOTÃO ADICIONAR */
.btn-add { 
    background: #cc0000; color: white; width: 100%; height: 60px; border-radius: 15px; font-family: 'Luckiest Guy', cursive; font-size: 1.5rem; border: none; cursor: pointer; transition: 0.2s; text-transform: uppercase;
}
.btn-add.success { background: #00e676 !important; }

/* INVENTÁRIO */
.item-lista { background: rgba(255,255,255,0.02); padding: 14px 20px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #cc0000; }

.controls { display: flex; align-items: center; gap: 10px; background: #000; padding: 6px 15px; border-radius: 10px; border: 1px solid #333; }
.btn-qty { background: transparent; border: none; color: #cc0000; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
.qty-input { background: transparent; border: none; color: #fff; width: 35px; text-align: center; font-weight: bold; font-size: 1.1rem; outline: none; }

/* AÇÕES */
.action-footer { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-top: 20px; }
.btn-footer { height: 55px; border-radius: 12px; border: none; font-family: 'Luckiest Guy'; cursor: pointer; transition: 0.2s; font-size: 1.1rem; text-transform: uppercase; }
.btn-clear, .btn-copy-total { background: #222; color: #fff; }
.btn-finish { background: #cc0000; color: #fff; }

/* RESUMO COM GLOW */
.summary-grid { display: flex; justify-content: center; gap: 12px; margin-top: 30px; flex-wrap: wrap; }
.box { 
    background: #0d0d0d; border: 1px solid #222; padding: 18px; border-radius: 14px; text-align: center; flex: 1; min-width: 170px; 
    box-shadow: 0 0 20px rgba(204, 0, 0, 0.4); 
}
.box span { font-size: 11px; color: #666; text-transform: uppercase; font-weight: 700; display: block;}
.val { display: block; font-size: 1.5rem; font-weight: bold; margin-top: 10px; }

/* MODAL */
.modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; align-items: center; justify-content: center; }
.modal-content { background: #0d0d0d; border: 1px solid #333; padding: 40px; border-radius: 20px; width: 90%; max-width: 450px; text-align: center; box-shadow: 0 0 30px rgba(204, 0, 0, 0.6); }
</style>
</head>
<body>

<div class="container">
    <h1 class="tropa-titulo">TROPA DA BÉLGICA</h1>

    <div class="card">
        <h3>🔫 Armamentos</h3>
        <div class="input-row">
            <div>
                <label>MERCADORIA</label>
                <select id="itemSel" class="select-box">
                    <option value="" disabled selected>Escolha...</option>
                    <option value="Sig Sauer,140000,130000,50000,42">Sig Sauer (140k)</option>
                    <option value="AK,120000,110000,46000,32">AK-47 (120k)</option>
                    <option value="SMG,80000,75000,30000,22">SMG (80k)</option>
                    <option value="PT,35000,30000,13500,12">Pistola (35k)</option>
                </select>
            </div>
            <div>
                <label>QUANTIDADE</label>
                <input type="number" id="qtd" class="input-text" value="1" min="1">
            </div>
        </div>
        <button id="btnAdd" class="btn-add" onclick="addItem()">REGISTRAR ARMAMENTO</button>
    </div>

    <div class="card">
        <h3>🛒 Venda De Mercadoria</h3>
        <div id="lista"></div>
        <div class="action-footer">
            <button class="btn-footer btn-clear" onclick="limpar()">Zerar</button>
            <button class="btn-footer btn-copy-total" onclick="copyTotal()">Copiar Valor</button>
            <button class="btn-footer btn-finish" onclick="abrirModal()">Parceria</button>
        </div>
    </div>

    <div class="summary-grid">
        <div class="box"><span>Peças</span><br><b id="totalPecas" class="val" style="color:#ff9800">0 un.</b></div>
        <div class="box"><span>Investimento</span><br><b id="totalCusto" class="val">R$ 0</b></div>
        <div class="box"><span>Lucro</span><br><b id="lucro" class="val" style="color:#00e676">R$ 0</b></div>
        <div class="box" id="boxTotal"><span>Total Bruto</span><br><b id="totalBruto" class="val">R$ 0</b></div>
    </div>
</div>

<div class="modal-overlay" id="modalConfirmar">
    <div class="modal-content">
        <h4 style="color:#fff; font-size:1.5rem; margin-bottom:15px;">Aplicar parceria?</h4>
        <button class="btn-add" style="height:55px; font-size:1.3rem;" onclick="confirmarVenda()">Aplicar Parceria</button>
        <p style="margin-top:20px; cursor:pointer; color:#777; font-weight: bold;" onclick="cancelarEManterPista()">Manter Pista</p>
    </div>
</div>

<script>
let lote = [];
let modoVenda = 'pista';
let valorNumericoBruto = 0;

const formatarMoeda = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

function addItem() {
    const sel = document.getElementById('itemSel');
    const btn = document.getElementById('btnAdd');
    if(!sel.value) return;
    const [nome, vPista, vParc, custoD, pecas] = sel.value.split(',');
    const qtdInput = parseInt(document.getElementById('qtd').value);
    
    let itemExistente = lote.find(i => i.nome === nome);
    if (itemExistente) { itemExistente.qtd += qtdInput; } 
    else {
        lote.push({ nome, vendaPista: Number(vPista), vendaParceria: Number(vParc), custoD: Number(custoD), pecas: Number(pecas), qtd: qtdInput });
    }

    btn.innerText = "REGISTRADO! ✓";
    btn.classList.add('success');
    setTimeout(() => { btn.innerText = "ADICIONAR AO LOTE"; btn.classList.remove('success'); }, 800);
    render();
}

function render() {
    const lista = document.getElementById('lista');
    lista.innerHTML = lote.length ? '' : '<p style="text-align:center; opacity:0.1; padding:10px;">LOTE VAZIO...</p>';
    lote.forEach((item, index) => {
        lista.innerHTML += `
            <div class="item-lista">
                <b>${item.nome}</b>
                <div style="display:flex; align-items:center;">
                    <div class="controls">
                        <button class="btn-qty" onclick="alterarQtd(${index}, -1)">-</button>
                        <input type="text" class="qty-input" value="${item.qtd}" readonly>
                        <button class="btn-qty" onclick="alterarQtd(${index}, 1)">+</button>
                    </div>
                    <span style="margin-left:15px; cursor:pointer; color:#444;" onclick="remover(${index})">✕</span>
                </div>
            </div>`;
    });
    calcular();
}

function calcular() {
    let bruto = 0, custo = 0, pecas = 0;
    lote.forEach(i => {
        let preco = (modoVenda === 'parceria') ? i.vendaParceria : i.vendaPista;
        bruto += preco * i.qtd;
        custo += i.custoD * i.qtd;
        pecas += i.pecas * i.qtd;
    });
    valorNumericoBruto = bruto;
    document.getElementById('totalBruto').innerText = formatarMoeda(bruto);
    document.getElementById('totalCusto').innerText = formatarMoeda(custo);
    document.getElementById('lucro').innerText = formatarMoeda(bruto - custo);
    document.getElementById('totalPecas').innerText = pecas + ' un.';
    
    const boxTotal = document.getElementById('boxTotal');
    boxTotal.style.borderColor = (modoVenda === 'parceria') ? '#cc0000' : '#222';
}

function copyTotal() {
    if(!lote.length) return;
    navigator.clipboard.writeText(Math.floor(valorNumericoBruto).toString());
    const btn = document.querySelector('.btn-copy-total');
    btn.innerText = "COPIADO!";
    setTimeout(() => btn.innerText = "COPIAR VALOR", 1000);
}

function alterarQtd(i, d) { lote[i].qtd = Math.max(1, lote[i].qtd + d); render(); }
function remover(i) { lote.splice(i, 1); render(); }
function limpar() { lote = []; modoVenda = 'pista'; render(); }
function abrirModal() { if(lote.length) document.getElementById('modalConfirmar').style.display = 'flex'; }
function confirmarVenda() { modoVenda = 'parceria'; fecharModal(); }
function cancelarEManterPista() { modoVenda = 'pista'; fecharModal(); }
function fecharModal() { document.getElementById('modalConfirmar').style.display = 'none'; calcular(); }
render();
</script>
</body>
</html>
