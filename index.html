<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REAL MÍDIA </title>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Metal+Mania&family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; transition: all 0.2s ease; }
        
        body {
            margin: 0; 
            font-family: 'Fredoka', sans-serif; 
            color: #fff; 
            background-color: #000; 
            background-image: linear-gradient(rgba(255, 255, 255, 0.02) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px;
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            width: 100vw;
            overflow-x: hidden;
            padding: 20px;
        }

        .container { 
            width: 100%; 
            max-width: 480px; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .tropa-titulo { 
            text-align: center; 
            font-family: 'Metal Mania', cursive; 
            font-size: 5.5rem; 
            margin: 0 0 30px 0; 
            text-transform: uppercase;
            background: linear-gradient(0deg, #444 0%, #fff 50%, #444 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.3));
            animation: glowTitle 3s infinite ease-in-out;
        }

        @keyframes glowTitle {
            0%, 100% { filter: drop-shadow(0 0 5px rgba(255,255,255,0.2)); }
            50% { filter: drop-shadow(0 0 20px rgba(255,255,255,0.5)); }
        }

        .card { 
            background: #0d0d0d;
            border-radius: 12px;
            margin-bottom: 15px;
            position: relative;
            padding: 2px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
        }


        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 12px;
            padding: 2px; 
            background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0.05) 50%, rgba(255,255,255,0.4) 100%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            filter: blur(1px);
        }

        .card-content {
            background: #0d0d0d;
            padding: 20px;
            border-radius: 10px;
            position: relative;
        }

        .select-box, .input-text { 
            width: 100%; height: 50px; background: #000; border: 1px solid #333; 
            padding: 0 15px; border-radius: 4px; color: #fff; font-size: 16px; outline: none;
        }

        .select-box:focus { border-color: #fff; }

        .btn-add { 
            background: #fff; color: #000; width: 100%; height: 55px; border-radius: 4px; 
            font-family: 'Luckiest Guy'; font-size: 1.2rem; border: none; cursor: pointer; 
            text-transform: uppercase; margin-top: 10px;
        }

        .item-lista { 
            background: #111; padding: 12px; border-radius: 6px; margin-bottom: 8px; 
            display: flex; flex-direction: column; border: 1px solid #222;
        }

        .item-info { display: flex; justify-content: space-between; align-items: center; }
        
        .cart-controls { display: flex; align-items: center; gap: 8px; background: #000; padding: 4px 8px; border-radius: 4px; border: 1px solid #333; }
        .btn-cart-qty { background: transparent; border: none; color: #fff; font-size: 1.2rem; font-weight: bold; cursor: pointer; }

        .btn-footer { 
            height: 45px; border-radius: 4px; border: 1px solid #333; font-family: 'Luckiest Guy'; 
            cursor: pointer; background: #050505; color: #fff; flex: 1;
        }

        .btn-finish { 
            background: #151515; color: #fff; border: 1px solid #333; height: 50px; 
            width: 100%; margin-top: 10px; border-radius: 4px; font-family: 'Luckiest Guy'; cursor: pointer;
        }

        .btn-finish.active-parc { background: #fff; color: #000; border-color: #fff; }

        .btn-discord { 
            background: #fff; color: #000; border: none; font-family: 'Luckiest Guy'; 
            height: 50px; border-radius: 4px; cursor: pointer; width: 100%; margin-top: 5px;
        }

        .box-total { 
            background: #000; border: 2px solid #fff; padding: 20px; border-radius: 4px; 
            text-align: center; margin-top: 15px; width: 100%;
        }

        .val-total { display: block; font-size: 3.5rem; font-family: 'Luckiest Guy'; color: #fff; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1 class="tropa-titulo">REAL MÍDIA</h1>

    <div class="card">
        <div class="card-content">
            <select id="itemSel" class="select-box">
                <option value="" disabled selected>Selecionar Munição...</option>
                <option value="PT 100X,5000,7500">PT 100X</option>
                <option value="SMG 150X,8000,10000">SMG 150X</option>
                <option value="FUZIL 250X,12000,14000">FUZIL 250X</option>
                <option value="C4,2500,2900">C4</option>
            </select>
            
            <input type="number" id="qtd" class="input-text" value="1" min="1" style="margin-top:10px;">
            <button class="btn-add" onclick="addItem()">ADICIONAR ITEM</button>
        </div>
    </div>

    <div class="card" id="cardCarrinho" style="display:none;">
        <div class="card-content">
            <div id="lista"></div>
            <div style="display:flex; gap:10px;">
                <button class="btn-footer" onclick="limpar()">Zerar</button>
                <button class="btn-footer" onclick="copyTotal()">Copiar</button>
            </div>
            <button class="btn-finish" id="btnModo" onclick="toggleModo()">MODO: SEM PARCERIA</button>
            <button class="btn-discord" onclick="enviarLogs()">ENVIAR PARA LOGS 🚀</button>
        </div>
    </div>

    <div class="box-total">
        <span style="font-size: 11px; color: #888; letter-spacing: 3px; font-weight: bold; text-transform: uppercase;">Total a Pagar</span>
        <b id="totalBruto" class="val-total">R$ 0,00</b>
    </div>
</div>

<script>
    const _0x_config = {
        _secret: atob("aHR0cHM6Ly9kaXNjb3JkLmNvbS9hcGkvd2ViaG9va3MvMTUwNDU4MzA0NzcwNDQ3Nzg5Ny9UQllOM182Q19QbTJDRjRWOWoyNDRtbGxQcmo1Y24tNXJoeWwtQ0RBZHZLY0F2enc5QnJuU0hNdGFjT1h3UWtadzdTaQ==")
    };

    let lote = JSON.parse(localStorage.getItem('midia_carrinho')) || [];
    let modoVenda = localStorage.getItem('midia_modo') || 'pista';

    const formatar = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

    function salvar() {
        localStorage.setItem('midia_carrinho', JSON.stringify(lote));
        localStorage.setItem('midia_modo', modoVenda);
    }

    function addItem() {
        const sel = document.getElementById('itemSel');
        if(!sel.value) return;
        const [nome, vParc, vPista] = sel.value.split(',');
        const qtdInput = parseInt(document.getElementById('qtd').value);
        
        const itemExistente = lote.find(i => i.nome === nome);
        if (itemExistente) {
            itemExistente.qtd += qtdInput;
        } else {
            lote.push({ nome, vParc: Number(vParc), vPista: Number(vPista), qtd: qtdInput });
        }
        document.getElementById('qtd').value = 1;
        render();
    }

    function alterarQtdCarrinho(index, delta) {
        lote[index].qtd = Math.max(1, lote[index].qtd + delta);
        render();
    }

    function render() {
        const lista = document.getElementById('lista');
        const card = document.getElementById('cardCarrinho');
        card.style.display = lote.length ? 'block' : 'none';
        lista.innerHTML = '';
        let total = 0;
        
        lote.forEach((item, i) => {
            let precoUnidade = (modoVenda === 'parceria' ? item.vParc : item.vPista);
            let subtotal = precoUnidade * item.qtd;
            total += subtotal;
            lista.innerHTML += `
                <div class="item-lista">
                    <div class="item-info">
                        <span style="color:#eee; font-weight:600;">${item.nome}</span>
                        <div style="display:flex; align-items:center; gap:8px;">
                            <div class="cart-controls">
                                <button class="btn-cart-qty" onclick="alterarQtdCarrinho(${i}, -1)">-</button>
                                <span style="font-weight:bold; min-width:20px; text-align:center;">${item.qtd}</span>
                                <button class="btn-cart-qty" onclick="alterarQtdCarrinho(${i}, 1)">+</button>
                            </div>
                            <span onclick="remover(${i})" style="color:#555; cursor:pointer;">✕</span>
                        </div>
                    </div>
                    <div style="font-size:10px; color:#888; margin-top:5px;">Subtotal: ${formatar(subtotal)}</div>
                </div>`;
        });

        document.getElementById('totalBruto').innerText = formatar(total);
        window.ultimoTotal = total;
        const btn = document.getElementById('btnModo');
        btn.innerText = modoVenda === 'parceria' ? "MODO: COM PARCERIA 🤝" : "MODO: SEM PARCERIA ✕";
        btn.className = modoVenda === 'parceria' ? 'btn-finish active-parc' : 'btn-finish';
        salvar();
    }

    function remover(i) { lote.splice(i, 1); render(); }
    function limpar() { if(confirm("Limpar tudo?")) { lote = []; render(); } }
    function toggleModo() { modoVenda = (modoVenda === 'pista' ? 'parceria' : 'pista'); render(); }
    function copyTotal() { navigator.clipboard.writeText(window.ultimoTotal); alert("Valor copiado!"); }

    async function enviarLogs() {
        if(!lote.length) return;
        const payload = {
            embeds: [{
                title: "📦 REGISTRO REAL MÍDIA",
                color: 0,
                fields: [
                    { name: "Itens", value: lote.map(i => `• ${i.qtd}x **${i.nome}**`).join('\n') },
                    { name: "Total", value: `\`${formatar(window.ultimoTotal)}\``, inline: true },
                    { name: "Tipo", value: modoVenda === 'parceria' ? "🤝 Parceria" : "✕ Pista", inline: true }
                ],
                footer: { text: "Nova Venda Registrada | " + new Date().toLocaleString() }
            }]
        };
        await fetch(_0x_config._secret, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        alert("Enviado para os logs!");
        lote = []; render();
    }
    render();
</script>
</body>
</html>
